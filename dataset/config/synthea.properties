# Synthea generator configuration template.
#
# Consumed by `make synthea-dev|reader|canonical` (see root Makefile).
# Population, seed, and output directory are overridden per scale by the
# Makefile invocation; values here are the Phase 3 defaults.
#
# The Synthea version that produced the committed golden answers is pinned
# alongside this file under tools/synthea/ at Phase 3. Upgrading Synthea
# invalidates the golden-answer snapshots (pipeline plan Section 11.2).

# Output
exporter.fhir.export                  = true
exporter.fhir.use_us_core_ig          = true
exporter.fhir.transaction_bundle      = true
exporter.hospital.fhir.export         = true
exporter.practitioner.fhir.export     = true
exporter.ccda.export                  = false
exporter.csv.export                   = false
exporter.text.export                  = false

# Determinism
generate.default_population           = 1000
seed                                  = 42
reference_time                        = 20240101

# Geography (single state reduces state-distribution variance; the book's
# facility mnemonics are state-agnostic)
generate.demographics.default_state   = Massachusetts
generate.geography.country_code       = US

# Clinical modules
generate.only_alive_patients          = false
generate.only_dead_patients           = false
generate.append_numbers_to_person_names = true

# Performance
generate.max_attempts_to_keep_patient = 100
generate.log_patients.detail          = none
